# Agentic Tests — dogfood: test this plugin's own skills with simulated users
#
# Requires: OPENAI_API_KEY secret (Settings > Secrets > Actions)

name: Agentic Tests

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agentic-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run agentic tests
        uses: GiggleLiu/agentic-tests@main
        with:
          runner: codex
          provider: openai
          mode: skill
          features: test-skill,test-feature,create-profile
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
