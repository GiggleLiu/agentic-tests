# Agentic Tests — dogfood: test this plugin's own skills with simulated users
#
# Trigger: comment "/agentic-tests" on any issue or PR
# Requires: OPENAI_API_KEY secret (Settings > Secrets > Actions)

name: Agentic Tests

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  agentic-test:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       startsWith(github.event.comment.body, '/agentic-tests'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: React to comment
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Parse features from comment
        if: github.event_name == 'issue_comment'
        id: parse
        run: |
          BODY="${{ github.event.comment.body }}"
          ARGS=$(echo "$BODY" | sed -n 's|^/agentic-tests[[:space:]]*||p')
          if [ -n "$ARGS" ]; then
            echo "features=$ARGS" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Run agentic tests
        uses: GiggleLiu/agentic-tests@main
        with:
          runner: codex
          provider: openai
          mode: skill
          features: ${{ steps.parse.outputs.features || 'test-skill,test-feature,create-profile' }}
          issue-number: ${{ github.event.issue.number }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
