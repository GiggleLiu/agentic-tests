name: 'Agentic Tests'
description: 'Run AI-driven agentic tests on your project using OpenCode, Codex, or Claude Code'

inputs:
  runner:
    description: 'Agent runner: "opencode", "codex", or "claude-code"'
    required: false
    default: 'opencode'
  provider:
    description: 'LLM provider — anthropic, openai, moonshot, etc.'
    required: true
  model:
    description: 'Model to use'
    required: false
    default: ''
  mode:
    description: 'Test mode: "feature" (test project features), "skill" (test skill flows), or "both"'
    required: false
    default: 'feature'
  features:
    description: 'Comma-separated list of features/skills to test'
    required: true
  profiles-dir:
    description: 'Directory containing saved agent profiles'
    required: false
    default: 'docs/agent-profiles'
  skills:
    description: 'Skills to install (comma-separated). Bare names resolve to built-in skills; paths resolve to local directories containing SKILL.md'
    required: false
    default: 'test-skill,test-feature,create-profile'
  skill-repos:
    description: 'Comma-separated GitHub repos containing skills to clone and install (e.g., "owner/repo,owner/repo2"). The AI agent reads each repo README to install skills.'
    required: false
    default: ''
  extra-prompt:
    description: 'Extra instructions appended to each test prompt (e.g., "focus on error handling", "test as a beginner")'
    required: false
    default: ''
  issue-number:
    description: 'Issue or PR number to post results to (optional)'
    required: false
    default: ''

outputs:
  features-tested:
    description: 'Comma-separated feature names tested'
    value: ${{ steps.test.outputs.features-tested }}
  pass:
    description: '"true" if no critical issues found'
    value: ${{ steps.test.outputs.pass }}

runs:
  using: 'composite'
  steps:
    - name: Install agent runner
      run: |
        case "${{ inputs.runner }}" in
          codex)       ${{ github.action_path }}/scripts/install-codex.sh ;;
          claude-code) ${{ github.action_path }}/scripts/install-claude-code.sh ;;
          *)           ${{ github.action_path }}/scripts/install-opencode.sh ;;
        esac
      shell: bash

    - name: Configure agent runner
      run: ${{ github.action_path }}/scripts/configure-runner.sh
      shell: bash
      env:
        INPUT_RUNNER: ${{ inputs.runner }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_PROVIDER: ${{ inputs.provider }}

    - name: Install skills
      run: ${{ github.action_path }}/scripts/install-skills.sh
      shell: bash
      env:
        INPUT_RUNNER: ${{ inputs.runner }}
        INPUT_SKILLS: ${{ inputs.skills }}
        ACTION_SKILLS_DIR: ${{ github.action_path }}/skills

    - name: Clone skill repos
      if: inputs.skill-repos != ''
      run: ${{ github.action_path }}/scripts/clone-skill-repos.sh
      shell: bash
      env:
        INPUT_SKILL_REPOS: ${{ inputs.skill-repos }}

    - name: Write feature list
      run: |
        echo "${{ inputs.features }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' > /tmp/affected-features.txt
        echo "Features to test:"
        cat /tmp/affected-features.txt
      shell: bash

    - name: Run agentic tests
      id: test
      run: ${{ github.action_path }}/scripts/run-tests.sh
      shell: bash
      env:
        INPUT_RUNNER: ${{ inputs.runner }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PROFILES_DIR: ${{ inputs.profiles-dir }}
        INPUT_EXTRA_PROMPT: ${{ inputs.extra-prompt }}
        SKILL_REPOS_DIR: .agentic-skills

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: agentic-test-reports
        path: docs/test-reports/*.md
        if-no-files-found: ignore

    - name: Post results
      if: always() && inputs.issue-number != ''
      run: ${{ github.action_path }}/scripts/post-result.sh ${{ inputs.issue-number }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
