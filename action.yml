name: 'Agentic Tests'
description: 'Run AI-driven agentic tests on your project using OpenCode, Codex, or Claude Code'

inputs:
  runner:
    description: 'Agent runner: "opencode", "codex", or "claude-code"'
    required: false
    default: 'opencode'
  provider:
    description: 'LLM provider — anthropic, openai, moonshot, etc.'
    required: true
  model:
    description: 'Model to use'
    required: false
    default: ''
  mode:
    description: 'Test mode: "feature" (test project features), "skill" (test skill flows), or "both"'
    required: false
    default: 'feature'
  features:
    description: '"auto" to AI-detect from diff, or comma-separated feature/skill list'
    required: false
    default: 'auto'
  profiles-dir:
    description: 'Directory containing saved agent profiles'
    required: false
    default: 'docs/agent-profiles'
  base-branch:
    description: 'Base branch for diff comparison'
    required: false
    default: 'origin/main'
  extra-prompt:
    description: 'Extra instructions appended to each test prompt (e.g., "focus on error handling", "test as a beginner")'
    required: false
    default: ''

outputs:
  features-tested:
    description: 'Comma-separated feature names tested'
    value: ${{ steps.test.outputs.features-tested }}
  pass:
    description: '"true" if no critical issues found'
    value: ${{ steps.test.outputs.pass }}

runs:
  using: 'composite'
  steps:
    - name: Install agent runner
      run: |
        case "${{ inputs.runner }}" in
          codex)       ${{ github.action_path }}/scripts/install-codex.sh ;;
          claude-code) ${{ github.action_path }}/scripts/install-claude-code.sh ;;
          *)           ${{ github.action_path }}/scripts/install-opencode.sh ;;
        esac
      shell: bash

    - name: Configure agent runner
      run: |
        case "${{ inputs.runner }}" in
          codex)
            mkdir -p ~/.codex
            MODEL="${{ inputs.model }}"
            {
              echo "model = \"${MODEL:-gpt-5.4}\""
              echo "model_provider = \"${{ inputs.provider }}\""
              echo "approval_policy = \"never\""
              echo ""
              echo "[features]"
              echo "multi_agent = true"
            } > ~/.codex/config.toml
            # Authenticate codex with API key
            if [ -n "${OPENAI_API_KEY:-}" ]; then
              printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key
            fi
            ;;
          claude-code)
            MODEL="${{ inputs.model }}"
            export ANTHROPIC_MODEL="${MODEL:-claude-opus-4-6}"
            echo "ANTHROPIC_MODEL=${MODEL:-claude-opus-4-6}" >> "${GITHUB_ENV}"
            ;;
          *)
            python3 -c "
        import json
        config = {'provider': '${{ inputs.provider }}'}
        model = '${{ inputs.model }}'
        if model:
            config['agents'] = {'coder': {'model': model}}
        with open('.opencode.json', 'w') as f:
            json.dump(config, f, indent=2)
        "
            ;;
        esac
      shell: bash

    - name: Install agentic-tests commands
      run: |
        case "${{ inputs.runner }}" in
          codex)
            mkdir -p .agents/skills
            for skill_dir in ${{ github.action_path }}/skills/*/; do
              skill_name="$(basename "$skill_dir")"
              if [ -f "$skill_dir/SKILL.md" ]; then
                mkdir -p .agents/skills/"$skill_name"
                cp "$skill_dir/SKILL.md" .agents/skills/"$skill_name"/SKILL.md
              fi
            done
            ;;
          claude-code)
            mkdir -p ~/.claude/commands
            for skill_dir in ${{ github.action_path }}/skills/*/; do
              skill_name="$(basename "$skill_dir")"
              if [ -f "$skill_dir/SKILL.md" ]; then
                cp "$skill_dir/SKILL.md" ~/.claude/commands/"$skill_name".md
              fi
            done
            ;;
          *)
            mkdir -p ~/.config/opencode/commands
            for skill_dir in ${{ github.action_path }}/skills/*/; do
              skill_name="$(basename "$skill_dir")"
              if [ -f "$skill_dir/SKILL.md" ]; then
                cp "$skill_dir/SKILL.md" ~/.config/opencode/commands/"$skill_name".md
              fi
            done
            ;;
        esac
      shell: bash

    - name: Detect affected features
      run: ${{ github.action_path }}/scripts/detect-features.sh
      shell: bash
      env:
        INPUT_RUNNER: ${{ inputs.runner }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_FEATURES: ${{ inputs.features }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}

    - name: Run agentic tests
      id: test
      run: ${{ github.action_path }}/scripts/run-tests.sh
      shell: bash
      env:
        INPUT_RUNNER: ${{ inputs.runner }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PROFILES_DIR: ${{ inputs.profiles-dir }}
        INPUT_EXTRA_PROMPT: ${{ inputs.extra-prompt }}

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: agentic-test-reports
        path: docs/test-reports/*.md
        if-no-files-found: ignore

    - name: Post PR comment
      if: always() && github.event_name == 'pull_request'
      run: ${{ github.action_path }}/scripts/post-comment.sh ${{ github.event.pull_request.number }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
